<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <clipPath id="grain-clip">
      <circle cx="60" cy="60" r="54"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="54" fill="#1c2e4a"/>
  <!-- Grain boundary network, clipped to circle -->
  <g clip-path="url(#grain-clip)" stroke="#4d9de0" stroke-linecap="round" fill="none">
    <!-- Inner hexagonal ring connecting six triple junctions -->
    <polygon points="60,32 85,45 87,72 65,90 38,82 32,52"
             stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Exits from each triple junction to the circle boundary -->
    <line x1="60"  y1="32" x2="60"  y2="4"   stroke-width="1.8"/>
    <line x1="85"  y1="45" x2="112" y2="30"  stroke-width="1.8"/>
    <line x1="87"  y1="72" x2="113" y2="75"  stroke-width="1.8"/>
    <line x1="65"  y1="90" x2="75"  y2="114" stroke-width="1.8"/>
    <line x1="38"  y1="82" x2="20"  y2="108" stroke-width="1.8"/>
    <line x1="32"  y1="52" x2="8"   y2="40"  stroke-width="1.8"/>
  </g>
  <!-- Triple junction markers -->
  <g fill="#4d9de0">
    <circle cx="60" cy="32" r="2.5"/>
    <circle cx="85" cy="45" r="2.5"/>
    <circle cx="87" cy="72" r="2.5"/>
    <circle cx="65" cy="90" r="2.5"/>
    <circle cx="38" cy="82" r="2.5"/>
    <circle cx="32" cy="52" r="2.5"/>
  </g>
  <!-- Outer circle border -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#4d9de0" stroke-width="3"/>
</svg>
